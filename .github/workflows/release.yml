name: release
# Build universal artifacts and attach them to a GitHub Release.
# Manual-dispatch for now: the menu-bar app needs a recent Xcode/SDK that the
# hosted macos runner may not have, so releases are currently cut locally
# (`make dist VERSION=x` + `gh release create`). Re-enable the tag trigger once
# the runner's Xcode is pinned to match (uncomment below).
on:
  workflow_dispatch:
    inputs:
      version: { description: "version, e.g. 0.1.0", required: true }
  # push:
  #   tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14   # Apple Silicon; xcodebuild builds the x86_64 slice too
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # tags for `git describe`

      - uses: actions/setup-go@v5
        with: { go-version: "1.26" }

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build universal artifacts
        run: make dist VERSION=${{ inputs.version }}
        # To notarize for public download, set these and add a notarize step:
        #   CODESIGN_ID, plus notarytool creds (APPLE_ID / TEAM_ID / app-specific pw).
        # env:
        #   CODESIGN_ID: "Developer ID Application: Your Name (TEAMID)"

      - name: Publish release
        run: |
          gh release create "v${{ inputs.version }}" dist/*.zip dist/*.tar.gz \
            --title "v${{ inputs.version }}" --generate-notes
          echo "### Homebrew artifacts" >> "$GITHUB_STEP_SUMMARY"
          (cd dist && shasum -a 256 *) >> "$GITHUB_STEP_SUMMARY"
        env:
          GH_TOKEN: ${{ github.token }}
