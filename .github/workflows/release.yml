name: release
# Build universal artifacts on a version tag and attach them to a GitHub Release.
# Push a tag to ship:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14   # Apple Silicon; xcodebuild builds the x86_64 slice too
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # tags for `git describe`

      - uses: actions/setup-go@v5
        with: { go-version: "1.26" }

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build universal artifacts
        run: make dist VERSION=${GITHUB_REF_NAME#v}
        # To notarize for public download, set these and add a notarize step:
        #   CODESIGN_ID, plus notarytool creds (APPLE_ID / TEAM_ID / app-specific pw).
        # env:
        #   CODESIGN_ID: "Developer ID Application: Your Name (TEAMID)"

      - name: Publish release
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.zip dist/*.tar.gz \
            --title "$GITHUB_REF_NAME" --generate-notes
          echo "### Homebrew artifacts" >> "$GITHUB_STEP_SUMMARY"
          (cd dist && shasum -a 256 *) >> "$GITHUB_STEP_SUMMARY"
        env:
          GH_TOKEN: ${{ github.token }}
