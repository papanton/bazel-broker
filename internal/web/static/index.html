<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bazel Broker</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header>
    <h1>Bazel&nbsp;Broker</h1>
    <span id="status" class="dot offline" title="WebSocket state"></span>
    <span id="summary" class="summary">— running · — queued</span>
    <button id="logout" type="button" hidden>log out</button>
  </header>

  <!-- Login gate: shown until a same-origin session cookie is minted. -->
  <section id="login" class="login" hidden>
    <form id="login-form">
      <label for="token">Broker token</label>
      <input id="token" name="token" type="password" autocomplete="off"
             placeholder="jq -r .token ~/.config/bazel-broker/config.json" spellcheck="false">
      <button type="submit">Connect</button>
      <p id="login-error" class="error" hidden></p>
    </form>
  </section>

  <main id="dashboard" hidden>
    <p id="offline-banner" class="banner" hidden>Broker offline — reconnecting…</p>
    <table id="builds">
      <thead>
        <tr>
          <th>worktree</th>
          <th>targets</th>
          <th>state</th>
          <th>elapsed</th>
          <th>cache hit</th>
          <th>profile</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <p id="empty" class="empty">No builds yet.</p>
  </main>

  <script src="/static/app.js" type="module"></script>
</body>
</html>
